name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Guard klend-sdk pin (fail on major bump beyond ^7.x)
        run: |
          KLEND_VER=$(jq -r '.dependencies["@kamino-finance/klend-sdk"]' package.json)
          KLEND_MAJOR=$(echo "$KLEND_VER" | sed 's/^[^0-9]*//' | cut -d. -f1)
          echo "klend-sdk pin: $KLEND_VER (major: $KLEND_MAJOR)"
          if [[ "$KLEND_MAJOR" != "7" ]]; then
            echo "::error::klend-sdk pin moved to major $KLEND_MAJOR (was ^7.x)."
            echo "::error::The pnpm.peerDependencyRules silencing of @solana/kit ^3 peer warnings is verified safe ONLY while klend-sdk runs on kit v2 at runtime."
            echo "::error::Re-verify mainnet behavior on the new major and update the _peerDependencyRulesRationale comment in package.json before merging."
            exit 1
          fi

      - name: Typecheck (client)
        run: pnpm exec tsc --noEmit

      - name: Typecheck (server)
        run: pnpm exec tsc -p server/tsconfig.json --noEmit

      - name: Run tests
        run: pnpm test:run

      - name: Build
        run: pnpm build
